<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="神装伝説 - しんそうでんせつ - ブラウザで遊べるダークファンタジーRPG">
  <title>神装伝説</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- ローディング画面 -->
  <div id="loading-screen">
    <h1>神装伝説</h1>
    <div class="subtitle">- しんそうでんせつ -</div>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <div id="loading-text">読み込み中...</div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/InputManager.js"></script>
  <script src="./js/data/ClassData.js"></script>
  <script src="./js/data/SkillData.js"></script>
  <script src="./js/data/EquipmentData.js"></script>
  <script src="./js/data/SlotTraitData.js"></script>
  <script src="./js/data/MonsterData.js"></script>
  <script src="./js/data/DropTableData.js"></script>
  <script src="./js/data/StatusSystem.js"></script>
  <script src="./js/systems/CombatSystem.js"></script>
  <script src="./js/systems/LevelSystem.js"></script>
  <script src="./js/systems/SkillSystem.js"></script>
  <script src="./js/systems/UpgradeSystem.js"></script>
  <script src="./js/systems/EquipmentSystem.js"></script>
  <script src="./js/systems/DropSystem.js"></script>
  <script src="./js/systems/SaveSystem.js"></script>
  <script src="./js/systems/SoundSystem.js"></script>
  <script src="./js/systems/BookSystem.js"></script>
  <script src="./js/systems/PartySystem.js"></script>
  <script src="./js/systems/WaveManager.js"></script>
  <script src="./js/systems/BalanceCheck.js"></script>
  <script src="./js/entities/Player.js"></script>
  <script src="./js/entities/Enemy.js"></script>
  <script src="./js/scenes/SceneManager.js"></script>
  <script src="./js/scenes/TitleScene.js"></script>
  <script src="./js/scenes/HomeScene.js"></script>
  <script src="./js/scenes/PartyScene.js"></script>
  <script src="./js/scenes/GachaScene.js"></script>
  <script src="./js/scenes/EquipScene.js"></script>
  <script src="./js/scenes/UpgradeScene.js"></script>
  <script src="./js/scenes/ShopScene.js"></script>
  <script src="./js/scenes/BagScene.js"></script>
  <script src="./js/scenes/BookScene.js"></script>
  <script src="./js/scenes/SettingsScene.js"></script>
  <script src="./js/scenes/SaveLoadScene.js"></script>
  <script src="./js/scenes/StageSelectScene.js"></script>
  <script src="./js/scenes/BattleScene.js"></script>
  <script src="./js/scenes/ResultScene.js"></script>
  <script src="./js/main.js"></script>
  <script>
    // ローディング完了（即座に非表示にするフォールバック付き）
    function hideLoading() {
      var ls = document.getElementById('loading-screen');
      if (ls && !ls.classList.contains('hidden')) {
        ls.classList.add('hidden');
        // 確実に非表示（transitionが効かない場合のフォールバック）
        setTimeout(function() { ls.style.display = 'none'; }, 600);
      }
    }
    window.addEventListener('load', function() {
      var bar = document.getElementById('loading-bar');
      if (bar) bar.style.width = '100%';
      var text = document.getElementById('loading-text');
      if (text) text.textContent = '完了！';
      setTimeout(hideLoading, 400);
    });
    // フォールバック: 3秒後に強制非表示
    setTimeout(hideLoading, 3000);
  </script>
</body>
</html>
